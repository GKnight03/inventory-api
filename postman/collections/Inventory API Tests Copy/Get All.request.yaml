$kind: http-request
url: "{{base_url}}/getAll"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array", function () {
          const data = pm.response.json();
          pm.expect(data).to.be.an("array");
      });
    language: text/javascript
order: 4000

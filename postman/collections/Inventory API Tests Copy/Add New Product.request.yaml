$kind: http-request
url: "{{base_url}}/addNew"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "ProductID": 20,
      "Name": "SSD",
      "UnitPrice": 89.99,
      "StockQuantity": 7,
      "Description": "1TB SSD"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Product added successfully", function () {
          const data = pm.response.json();
          pm.expect(data.message).to.eql("Product added successfully");
          pm.expect(data.product).to.have.property("ProductID");
          pm.expect(data.product).to.have.property("Name");
      });
    language: text/javascript
order: 2000

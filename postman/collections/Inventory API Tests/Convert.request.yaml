$kind: http-request
url: '{{base_url}}/convert?id=20'
method: GET
order: 7000
queryParams:
  - key: id
    value: '20'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Converted price fields exist", function () {
          const data = pm.response.json();
          pm.expect(data).to.have.property("PriceUSD");
          pm.expect(data).to.have.property("PriceEUR");
      });